name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [20, 22]
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: install
        run: npm ci

      - name: install web deps
        run: npm --prefix web ci

      - name: install sdk dev deps
        run: npm --prefix sdk install

      - name: unit tests (excl. compiled-SDK suite, runs after build)
        run: npm test

      - name: openapi spec lint
        run: npm run lint:openapi

      - name: openapi schema-drift check
        run: npm run lint:schema-drift

      - name: openapi runtime-drift check (boot daemon, hit every GET, validate response)
        run: |
          npm start &
          DAEMON_PID=$!
          # Wait for /health to come up (<= 30s)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3456/api/health > /dev/null; then break; fi
            sleep 1
          done
          set +e
          npm run lint:runtime-drift
          STATUS=$?
          kill $DAEMON_PID 2>/dev/null
          exit $STATUS

      - name: web build
        run: npm --prefix web run build

      - name: bundle size budget
        run: npm run lint:bundle-size

      - name: install playwright chromium
        run: npx playwright install chromium

      - name: visual i18n + snapshot diff (spawn daemon on :3458)
        run: |
          PORT=3458 node src/daemon.js > /tmp/c4-ci-daemon.log 2>&1 &
          DAEMON_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3458/api/health > /dev/null; then break; fi
            sleep 1
          done
          set +e
          npm run lint:i18n-visual
          STATUS_VISUAL=$?
          npm run lint:a11y
          STATUS_A11Y=$?
          kill $DAEMON_PID 2>/dev/null
          if [ "$STATUS_VISUAL" -ne 0 ]; then
            echo "::error::i18n-visual + snapshot diff failed"
            exit 1
          fi
          if [ "$STATUS_A11Y" -ne 0 ]; then
            echo "::error::a11y audit failed"
            exit 1
          fi

      - name: sdk build (tsc → dist + cjs shim)
        run: npm --prefix sdk run build

      - name: sdk compiled-runtime test
        run: node --test tests/c4-client-compiled.test.js
