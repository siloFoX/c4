name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [20, 22]
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: install
        run: npm ci

      - name: install web deps
        run: npm --prefix web ci

      - name: unit tests
        run: npm test

      - name: openapi spec lint
        run: npm run lint:openapi

      - name: web build
        run: npm --prefix web run build
